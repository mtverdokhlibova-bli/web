<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table</title>
    <style>
        table,
        td {
            border: 1px solid #a16262;
            padding: 25px;
        }
        table {
            border-collapse: collapse;
        }

    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
            <td rowspan="2" style="background-color: #7fe3b9">6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>13</td>
            <td style="background-color: #d32020">14</td>
            <td>15</td>
            <td>16</td>
        </tr>
        <tr>
            <td>17</td>
            <td style = "background-color: #d32020">18</td>
            <td>19</td>
            <td>20</td>
        </tr>
        <tr>
            <td>21</td>
            <td style = "background-color: #d32020" >22</td>
            <td>23</td>
            <td>24</td>
        </tr>
        <tr>
            <td>25</td>
            <td colspan="3" style = "background-color: #4cc64e" >26</td>
        </tr>
        <tr>
            <td>29</td>
            <td style = "background-color: #7fe3b9" >30</td>
            <td style = "background-color: #7fe3b9">31</td>
            <td style = "background-color: #7fe3b9">32</td>
        </tr>
    </table>

</body>
</html>
